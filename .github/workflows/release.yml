name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: nx release (independent, version plans)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Most pushes to main carry no version plans; only release when some are pending.
      - name: Check for pending version plans
        id: plans
        run: |
          if ls .nx/version-plans/*.md >/dev/null 2>&1; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No version plans found — skipping release."
          fi

      - name: Setup
        if: steps.plans.outputs.present == 'true'
        uses: ./.github/actions/setup

      - name: Configure git
        if: steps.plans.outputs.present == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Bumps each project independently from its version plan(s), writes per-project
      # changelogs, commits, and tags ({projectName}@{version}). The release commit
      # carries [skip ci] so it does not re-trigger this workflow.
      - name: Release
        if: steps.plans.outputs.present == 'true'
        run: pnpm exec nx release --yes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push release commit and tags
        if: steps.plans.outputs.present == 'true'
        run: git push --follow-tags origin HEAD:main

      # Publishes the committed (CI-verified) OpenAPI spec to the Scalar registry,
      # but only when cpm-registry was part of this release — detected via the
      # cpm-registry@{version} tag nx just created. Versioned by that tag.
      - name: Publish CPM Registry docs to Scalar
        if: steps.plans.outputs.present == 'true'
        env:
          SCALAR_API_KEY: ${{ secrets.SCALAR_API_KEY }}
        run: |
          version="$(git tag --points-at HEAD | sed -n 's/^cpm-registry@//p' | head -n1)"
          if [ -z "$version" ]; then
            echo "cpm-registry was not released in this run — skipping Scalar publish."
            exit 0
          fi
          if [ -z "$SCALAR_API_KEY" ]; then
            echo "::warning::SCALAR_API_KEY is not set — skipping Scalar publish for cpm-registry@$version."
            exit 0
          fi
          echo "Publishing cpm-registry@$version docs to Scalar."
          # Pinned for reproducibility — bump deliberately after checking the CLI changelog.
          npm install -g @scalar/cli@2.0.0
          scalar auth login --token "$SCALAR_API_KEY"
          scalar registry publish apps/cpm-registry/openapi.yaml --slug cpm-registry --version "$version"
