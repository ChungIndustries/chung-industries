name: Release

# Changesets-style release flow, part 2 of 2.
#
# Fires when the automated release PR (from release-pr.yml) is merged. The merged
# commit already carries the version bumps and changelogs; this workflow turns that
# into an actual release by tagging each released project and publishing.
on:
  pull_request:
    types: [closed]
    branches: [main]
  # Recovery hatch: re-runs the publish/deploy half of a release that failed
  # after tagging. Tagging is idempotent (existing tags are a no-op) and the
  # publish/deploy steps fall back to the newest cpm-registry tag.
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Tag and publish the merged release
    # Only the merge (not a plain close) of the release branch, and only when
    # merged - or a manual recovery dispatch.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'release/next')
    runs-on: ubuntu-latest
    outputs:
      cpm-registry-version: ${{ steps.released.outputs.cpm-registry-version }}
    steps:
      - name: Checkout main (post-merge)
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          # Needed so the tag step can reliably tell which tags already exist
          # (makes re-running a completed release a clean no-op instead of a
          # failed push against an existing remote tag).
          fetch-tags: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # The prepare phase deliberately did not tag. Detect the released projects
      # from the merge commit, tag each as {projectName}@{version}, and push the
      # tags. The tag command uses only git and node builtins, so no dependency
      # install is needed here (add the setup action if that ever changes).
      # On a recovery dispatch, HEAD is not necessarily a release commit; skip.
      - name: Tag released projects
        if: github.event_name == 'pull_request'
        run: node tools/release.mjs tag

      # Whether cpm-registry was part of this release, detected via the
      # cpm-registry@{version} tag just created. Gates the Scalar publish below
      # and the deploy job. A recovery dispatch falls back to the newest
      # cpm-registry tag, re-publishing that release's artifacts from main.
      - name: Detect released cpm-registry version
        id: released
        run: |
          version="$(git tag --points-at HEAD | sed -n 's/^cpm-registry@//p' | head -n1)"
          if [ -z "$version" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="$(git tag -l 'cpm-registry@*' --sort=-version:refname | head -n1 | sed 's/^cpm-registry@//')"
          fi
          echo "cpm-registry-version=$version" >> "$GITHUB_OUTPUT"
          echo "cpm-registry release detected: '${version:-none}'"

      # @scalar/cli requires Node >= 24; the runner default is older, and this
      # job intentionally skips the full pnpm setup action.
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      # Publishes the committed (CI-verified) OpenAPI spec to the Scalar registry,
      # versioned by the release tag.
      - name: Publish CPM Registry docs to Scalar
        env:
          SCALAR_API_KEY: ${{ secrets.SCALAR_API_KEY }}
          version: ${{ steps.released.outputs.cpm-registry-version }}
        run: |
          if [ -z "$version" ]; then
            echo "cpm-registry was not released in this run, skipping Scalar publish."
            exit 0
          fi
          if [ -z "$SCALAR_API_KEY" ]; then
            echo "::warning::SCALAR_API_KEY is not set, skipping Scalar publish for cpm-registry@$version."
            exit 0
          fi
          echo "Publishing cpm-registry@$version docs to Scalar."
          # Pinned for reproducibility. Bump deliberately after checking the CLI changelog.
          npm install -g @scalar/cli@2.0.0
          scalar auth login --token "$SCALAR_API_KEY"
          scalar registry publish apps/cpm-registry/openapi.yaml --slug cpm-registry --version "$version"

      # Tidy up so the next release starts from a fresh branch (best-effort; the repo
      # may already auto-delete merged branches). Uses the checkout-persisted token.
      - name: Delete release branch
        if: github.event_name == 'pull_request'
        run: git push origin --delete release/next || true

  # Deploys ride the release train: only a release that includes cpm-registry
  # ships the Worker. Manual deploys stay available via the called workflow's
  # workflow_dispatch trigger.
  deploy-cpm-registry:
    name: Deploy CPM Registry
    needs: release
    if: needs.release.outputs.cpm-registry-version != ''
    uses: ./.github/workflows/deploy-cpm-registry.yml
    secrets: inherit
