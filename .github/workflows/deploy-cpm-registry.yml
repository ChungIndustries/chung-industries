name: Deploy CPM Registry

on:
  push:
    branches: [main]
    paths:
      - "apps/cpm-registry/**"

concurrency:
  group: deploy-cpm-registry
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      # Create a Cloudflare API token with Workers Scripts, D1, and R2 edit
      # permissions and add these two repository secrets.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      # The workflow is inert until the Cloudflare account is provisioned and
      # both secrets are configured; skip with a warning instead of failing.
      - name: Check Cloudflare credentials
        id: creds
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID are not set — skipping deploy."
          fi

      - name: Checkout
        if: steps.creds.outputs.present == 'true'
        uses: actions/checkout@v7

      - name: Setup
        if: steps.creds.outputs.present == 'true'
        uses: ./.github/actions/setup

      # Applies any pending D1 migrations to the remote database before the new
      # Worker (which may depend on them) goes live.
      - name: Apply D1 migrations
        if: steps.creds.outputs.present == 'true'
        run: pnpm --filter cpm-registry db:migrate:remote

      - name: Deploy Worker
        if: steps.creds.outputs.present == 'true'
        run: pnpm --filter cpm-registry deploy
