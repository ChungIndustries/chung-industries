name: Deploy CPM Registry

# Deploys are release-gated: release.yml calls this workflow after a release
# that includes cpm-registry (detected via the cpm-registry@{version} tag).
# workflow_dispatch remains for manual deploys/redeploys of current main.
on:
  workflow_call:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-cpm-registry
      cancel-in-progress: false
    env:
      # Create a Cloudflare API token with Workers Scripts, D1, and R2 edit
      # permissions and add these two repository secrets.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Always deploy main, regardless of the calling event's sha.
          ref: main

      - name: Setup
        uses: ./.github/actions/setup

      # Applies any pending D1 migrations to the remote database before the new
      # Worker (which may depend on them) goes live.
      - name: Apply D1 migrations
        run: pnpm --filter cpm-registry db:migrate:remote

      # `run deploy`, not `deploy`: pnpm's built-in deploy command shadows the
      # package script of the same name.
      - name: Deploy Worker
        run: pnpm --filter cpm-registry run deploy
